<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognition Map</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap');

        :root {
            --bg: #0f1217;
            --panel: #141922d9;
            --panel-border: #2a3444;
            --text: #e8edf8;
            --muted: #93a2bc;
            --accent: #f3f6ff;
            --dot: #eef2ff;
            --dot-active: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            color: var(--text);
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 14% 10%, #1b2230 0%, #1b223000 36%),
                radial-gradient(circle at 82% 24%, #1c2535 0%, #1c253500 38%),
                linear-gradient(180deg, #10141c 0%, #0b0f15 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.3;
            background-image:
                linear-gradient(to right, rgba(124, 140, 168, 0.07) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(124, 140, 168, 0.06) 1px, transparent 1px);
            background-size: 38px 38px;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            background: #121823f2;
            border-bottom: 1px solid #263244;
            backdrop-filter: blur(8px);
        }

        .top-nav a {
            color: #d3deef;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 8px;
        }

        .top-nav a.active,
        .top-nav a:hover {
            color: #ffffff;
            background: #243248;
        }

        #layout {
            height: calc(100vh - 53px);
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            min-height: 480px;
        }

        #map-stage {
            position: relative;
            overflow: hidden;
            cursor: grab;
        }

        #map-stage.panning {
            cursor: grabbing;
        }

        #map-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #status-chip {
            position: absolute;
            left: 14px;
            top: 14px;
            border: 1px solid #314159;
            background: #111824d6;
            color: var(--muted);
            font-size: 12px;
            border-radius: 999px;
            padding: 6px 11px;
            pointer-events: none;
        }

        #title-chip {
            position: absolute;
            left: 14px;
            bottom: 14px;
            letter-spacing: 0.34em;
            font-weight: 700;
            color: #f2f6ff;
            font-size: 26px;
            opacity: 0.85;
            pointer-events: none;
        }

        #sidebar {
            border-left: 1px solid #263244;
            background: #101721d9;
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .section {
            border-bottom: 1px solid #243245;
            padding: 12px;
        }

        .section h2 {
            margin: 0 0 8px;
            font-size: 13px;
            color: #ced7e9;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #meta {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
        }

        #paths-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        #paths-list li {
            border: 1px solid #354764;
            border-radius: 999px;
            padding: 4px 9px;
            font-size: 12px;
            color: #d7e1f3;
            background: #1a2535;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        #paths-list input[type="checkbox"] {
            accent-color: #c9d9ff;
        }

        #note-panel {
            padding: 12px;
            overflow: auto;
            min-height: 0;
            flex: 1;
            line-height: 1.45;
        }

        #note-panel .empty {
            color: var(--muted);
            font-size: 13px;
        }

        #note-title {
            margin: 0 0 8px;
            font-size: 14px;
            color: #f2f6ff;
        }

        #note-meta {
            margin-bottom: 10px;
            font-size: 12px;
            color: var(--muted);
        }

        #note-body {
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 13px;
            color: #e4ebf9;
        }

        #note-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }

        .btn {
            border: 1px solid #405471;
            background: #1a2a3f;
            color: #f1f5ff;
            border-radius: 8px;
            padding: 7px 10px;
            font: inherit;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn:hover {
            background: #22354f;
        }

        #tooltip {
            position: absolute;
            z-index: 30;
            pointer-events: none;
            transform: translate(10px, 10px);
            max-width: 280px;
            border: 1px solid #33455f;
            background: #101823ed;
            color: #dde6f7;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 120ms ease;
        }

        #tooltip.show {
            opacity: 1;
        }

        @media (max-width: 980px) {
            #layout {
                grid-template-columns: 1fr;
                grid-template-rows: minmax(410px, 56vh) minmax(250px, 1fr);
            }
            #sidebar {
                border-left: 0;
                border-top: 1px solid #263244;
            }
            #title-chip {
                font-size: 18px;
                letter-spacing: 0.22em;
            }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="q.html">Search</a>
        <a href="graph.html">Graph</a>
        <a href="map.html" class="active">Map</a>
        <a href="reader.html">Reader</a>
        <a href="duplicate.html">Duplicates</a>
        <a href="random.html">Random</a>
    </nav>
    <div id="layout">
        <section id="map-stage">
            <canvas id="map-canvas"></canvas>
            <div id="status-chip">Loading map...</div>
            <div id="title-chip">COGNITIVE MAP</div>
            <div id="tooltip"></div>
        </section>
        <aside id="sidebar">
            <div class="section">
                <h2>Map Stats</h2>
                <div id="meta"></div>
            </div>
            <div class="section">
                <h2>Path Filter</h2>
                <ul id="paths-list"></ul>
            </div>
            <div id="note-panel">
                <div class="empty">Click any note dot to open q.html exploration and preview it here.</div>
            </div>
        </aside>
    </div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const canvas = document.getElementById("map-canvas");
    const stage = document.getElementById("map-stage");
    const tooltip = document.getElementById("tooltip");
    const statusChip = document.getElementById("status-chip");
    const meta = document.getElementById("meta");
    const pathsList = document.getElementById("paths-list");
    const notePanel = document.getElementById("note-panel");
    const ctx = canvas.getContext("2d");

    const state = {
        data: null,
        notes: [],
        clusters: [],
        camera: { x: 0, y: 0, k: 1 },
        hovered: null,
        selected: null,
        dragging: false,
        dragPointerId: null,
        dragMoved: false,
        dragStart: { x: 0, y: 0 },
        lastPointer: { x: 0, y: 0 },
        visibleLookups: new Set()
    };

    function hashString(text) {
        let h = 0;
        const t = String(text || "");
        for (let i = 0; i < t.length; i += 1) {
            h = ((h << 5) - h) + t.charCodeAt(i);
            h |= 0;
        }
        return Math.abs(h);
    }

    function api(path) {
        const base = window.location.origin && window.location.origin.startsWith("http")
            ? window.location.origin
            : "http://localhost:4567";
        return `${base}${path}`;
    }

    function setStatus(text) {
        statusChip.textContent = text;
    }

    function resizeCanvas() {
        const rect = stage.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(rect.width * ratio));
        canvas.height = Math.max(1, Math.floor(rect.height * ratio));
        canvas.style.width = `${rect.width}px`;
        canvas.style.height = `${rect.height}px`;
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        draw();
    }

    function worldToScreen(x, y) {
        return {
            x: x * state.camera.k + state.camera.x,
            y: y * state.camera.k + state.camera.y
        };
    }

    function screenToWorld(x, y) {
        return {
            x: (x - state.camera.x) / state.camera.k,
            y: (y - state.camera.y) / state.camera.k
        };
    }

    function mapBounds() {
        if (!state.data) {
            return { width: 1000, height: 700 };
        }
        return {
            width: Number(state.data.width || 1000),
            height: Number(state.data.height || 700)
        };
    }

    function resetView() {
        const bounds = mapBounds();
        const width = stage.clientWidth || 1;
        const height = stage.clientHeight || 1;
        const kx = (width * 0.9) / bounds.width;
        const ky = (height * 0.9) / bounds.height;
        state.camera.k = Math.max(0.2, Math.min(3.2, Math.min(kx, ky)));
        state.camera.x = (width - bounds.width * state.camera.k) / 2;
        state.camera.y = (height - bounds.height * state.camera.k) / 2;
    }

    function noteVisible(note) {
        if (state.visibleLookups.size === 0) return true;
        return state.visibleLookups.has(note.lookup);
    }

    function visibleNotes() {
        return state.notes.filter(noteVisible);
    }

    function clusterVisibleCount() {
        const map = new Map();
        visibleNotes().forEach(note => {
            map.set(note.clusterId, (map.get(note.clusterId) || 0) + 1);
        });
        return map;
    }

    function drawBackgroundGrid() {
        const width = stage.clientWidth;
        const height = stage.clientHeight;
        ctx.save();
        ctx.strokeStyle = "rgba(160,180,220,0.08)";
        ctx.lineWidth = 1;
        const step = 44;
        const offsetX = state.camera.x % step;
        const offsetY = state.camera.y % step;
        ctx.beginPath();
        for (let x = offsetX; x < width; x += step) {
            ctx.moveTo(x, 0);
            ctx.lineTo(x, height);
        }
        for (let y = offsetY; y < height; y += step) {
            ctx.moveTo(0, y);
            ctx.lineTo(width, y);
        }
        ctx.stroke();
        ctx.restore();
    }

    function drawWarpedRing(cx, cy, rx, ry, phase, wobble) {
        const steps = 76;
        ctx.beginPath();
        for (let i = 0; i <= steps; i += 1) {
            const a = (i / steps) * Math.PI * 2;
            const noise = 1
                + Math.sin((a * 3.0) + phase) * wobble
                + Math.cos((a * 5.0) - phase * 0.9) * wobble * 0.6;
            const wx = cx + Math.cos(a) * rx * noise;
            const wy = cy + Math.sin(a) * ry * noise;
            if (i === 0) {
                ctx.moveTo(wx, wy);
            } else {
                ctx.lineTo(wx, wy);
            }
        }
        ctx.closePath();
    }

    function drawContours() {
        const visibleCount = clusterVisibleCount();
        const clusters = state.clusters.slice().sort((a, b) => a.noteCount - b.noteCount);
        const labelCandidates = state.clusters
            .map(cluster => ({ cluster, count: visibleCount.get(cluster.id) || 0 }))
            .filter(item => item.count > 0)
            .sort((a, b) => b.count - a.count)
            .slice(0, 10);
        const labelAllow = new Set(labelCandidates.map(item => item.cluster.id));

        clusters.forEach(cluster => {
            const activeCount = visibleCount.get(cluster.id) || 0;
            if (activeCount <= 0) return;

            const p = worldToScreen(cluster.centerX, cluster.centerY);
            const spreadX = cluster.spreadX * state.camera.k;
            const spreadY = cluster.spreadY * state.camera.k;
            const ringCount = Math.max(7, Math.min(16, Math.round(Math.sqrt(activeCount) * 1.45 + 5)));
            const seed = hashString(cluster.id);
            const basePhase = (seed % 628) / 100.0;

            ctx.save();
            ctx.strokeStyle = "rgba(235, 242, 255, 0.28)";
            ctx.lineWidth = 1;

            for (let ring = ringCount; ring >= 1; ring -= 1) {
                const t = ring / ringCount;
                const rx = (spreadX * 0.88) + (spreadX * 1.6 * t) + (7 * t);
                const ry = (spreadY * 0.88) + (spreadY * 1.6 * t) + (7 * t);
                drawWarpedRing(
                    p.x,
                    p.y,
                    rx,
                    ry,
                    basePhase + ring * 0.25,
                    0.022 + (0.009 * (1 - t))
                );
                ctx.stroke();
            }

            if (labelAllow.has(cluster.id) && activeCount >= 14 && state.camera.k >= 0.26) {
                ctx.fillStyle = "rgba(246, 250, 255, 0.92)";
                ctx.font = `600 ${Math.max(12, Math.min(16, 11 + Math.sqrt(activeCount) * 0.75))}px "Space Grotesk", sans-serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowColor = "rgba(4, 8, 16, 0.8)";
                ctx.shadowBlur = 7;
                ctx.fillText(cluster.label, p.x, p.y);
                ctx.shadowBlur = 0;
            }

            ctx.restore();
        });
    }

    function drawNotes() {
        const visible = visibleNotes();
        const maxPoints = state.camera.k < 0.34
            ? 2300
            : (state.camera.k < 0.55 ? 4200 : Number.MAX_SAFE_INTEGER);
        const step = visible.length > maxPoints ? Math.ceil(visible.length / maxPoints) : 1;

        for (let i = 0; i < visible.length; i += step) {
            const note = visible[i];
            const p = worldToScreen(note.x, note.y);
            const isHover = state.hovered && state.hovered.id === note.id;
            const isSelected = state.selected && state.selected.id === note.id;
            const radius = isSelected ? 3.1 : (isHover ? 2.4 : 1.45);

            ctx.beginPath();
            ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
            ctx.fillStyle = isSelected
                ? "rgba(255, 255, 255, 0.98)"
                : (isHover ? "rgba(250, 253, 255, 0.9)" : "rgba(226, 235, 255, 0.4)");
            ctx.fill();
        }
    }

    function draw() {
        const width = stage.clientWidth;
        const height = stage.clientHeight;
        ctx.clearRect(0, 0, width, height);
        drawBackgroundGrid();
        drawContours();
        drawNotes();
    }

    function pointerPos(evt) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: evt.clientX - rect.left,
            y: evt.clientY - rect.top
        };
    }

    function nearestNote(screenX, screenY) {
        const world = screenToWorld(screenX, screenY);
        let best = null;
        let bestD2 = Infinity;
        const hitRadiusWorld = 9 / Math.max(state.camera.k, 0.001);
        const hitRadius2 = hitRadiusWorld * hitRadiusWorld;
        visibleNotes().forEach(note => {
            const dx = note.x - world.x;
            const dy = note.y - world.y;
            const d2 = (dx * dx) + (dy * dy);
            if (d2 < bestD2 && d2 <= hitRadius2) {
                best = note;
                bestD2 = d2;
            }
        });
        return best;
    }

    function summarizeText(text, max = 260) {
        const compact = String(text || "").replace(/\s+/g, " ").trim();
        return compact.length > max ? `${compact.slice(0, max)}...` : compact;
    }

    function renderNotePanel(note) {
        if (!note) {
            notePanel.innerHTML = '<div class="empty">Click any note dot to open q.html exploration and preview it here.</div>';
            return;
        }
        notePanel.innerHTML = `
            <h3 id="note-title">${note.title || "Untitled Note"}</h3>
            <div id="note-meta">
                Path: ${note.lookup || "-"}<br>
                Chunk: ${note.chunk}<br>
                Mountain: ${note.clusterId}
            </div>
            <div id="note-body">${summarizeText(note.text)}</div>
            <div id="note-actions">
                <button class="btn" id="open-search-btn" type="button">Explore In q.html</button>
                ${note.url ? '<button class="btn" id="open-source-btn" type="button">Open Source</button>' : ""}
            </div>
        `;
        const openSearchBtn = document.getElementById("open-search-btn");
        openSearchBtn.addEventListener("click", () => openInSearch(note));
        if (note.url) {
            const openSourceBtn = document.getElementById("open-source-btn");
            openSourceBtn.addEventListener("click", () => window.open(note.url, "_blank", "noopener,noreferrer"));
        }
    }

    function showTooltip(note, screenX, screenY) {
        if (!note) {
            tooltip.classList.remove("show");
            return;
        }
        tooltip.innerHTML = `<strong>${note.lookup}</strong><br>${summarizeText(note.text, 120)}`;
        tooltip.style.left = `${screenX}px`;
        tooltip.style.top = `${screenY}px`;
        tooltip.classList.add("show");
    }

    function openInSearch(note) {
        const safeNote = typeof note.text === "string" ? note.text.trim() : "";
        if (!safeNote) {
            setStatus("Cannot open empty note");
            return;
        }
        const key = `qExploreNote:${Date.now()}:${Math.random().toString(36).slice(2, 8)}`;
        localStorage.setItem(key, JSON.stringify({ note: safeNote, createdAt: Date.now() }));
        window.open(`q.html?exploreKey=${encodeURIComponent(key)}`, "_blank", "noopener,noreferrer");
    }

    function toggleLookup(name, checked) {
        if (checked) {
            state.visibleLookups.add(name);
        } else {
            state.visibleLookups.delete(name);
        }
        draw();
        setStatus(`Showing ${visibleNotes().length} notes`);
    }

    function renderPaths(lookups) {
        pathsList.innerHTML = "";
        state.visibleLookups = new Set(lookups);
        lookups.forEach(name => {
            const li = document.createElement("li");
            const id = `path-${hashString(name)}`;
            li.innerHTML = `
                <input type="checkbox" id="${id}" checked>
                <label for="${id}">${name}</label>
            `;
            const checkbox = li.querySelector("input");
            checkbox.addEventListener("change", () => toggleLookup(name, checkbox.checked));
            pathsList.appendChild(li);
        });
    }

    function renderMeta(data) {
        meta.innerHTML = `
            Generated: ${new Date(data.generatedAt).toLocaleString()}<br>
            Notes: ${data.noteCount}<br>
            Mountains: ${data.clusters.length}<br>
            Vector Dim: ${data.vectorDim}
        `;
    }

    function loadData() {
        setStatus("Loading map data...");
        fetch(api("/map_data"))
            .then(resp => {
                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}`);
                }
                return resp.json();
            })
            .then(data => {
                state.data = data;
                state.notes = Array.isArray(data.notes) ? data.notes : [];
                state.clusters = Array.isArray(data.clusters) ? data.clusters : [];
                const lookups = Array.from(new Set(state.notes.map(n => n.lookup).filter(Boolean))).sort();
                renderPaths(lookups);
                renderMeta(data);
                resetView();
                draw();
                setStatus(`Loaded ${state.notes.length} notes in ${state.clusters.length} mountains`);
            })
            .catch(err => {
                console.error(err);
                setStatus("Failed to load map data");
                meta.textContent = "Run `run-index-map config.json`, then refresh this page.";
            });
    }

    function onPointerDown(evt) {
        canvas.setPointerCapture(evt.pointerId);
        const p = pointerPos(evt);
        state.dragging = true;
        state.dragPointerId = evt.pointerId;
        state.dragMoved = false;
        state.dragStart = { x: p.x, y: p.y };
        stage.classList.add("panning");
    }

    function onPointerMove(evt) {
        const p = pointerPos(evt);
        state.lastPointer = p;
        const hit = nearestNote(p.x, p.y);
        state.hovered = hit;
        showTooltip(hit, p.x, p.y);

        if (state.dragging && state.dragPointerId === evt.pointerId) {
            const dx = p.x - state.dragStart.x;
            const dy = p.y - state.dragStart.y;
            if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
                state.dragMoved = true;
            }
            state.camera.x += dx;
            state.camera.y += dy;
            state.dragStart = p;
        }

        draw();
    }

    function onPointerUp(evt) {
        if (state.dragPointerId !== evt.pointerId) return;
        stage.classList.remove("panning");
        state.dragging = false;
        state.dragPointerId = null;

        if (!state.dragMoved) {
            const hit = nearestNote(state.lastPointer.x, state.lastPointer.y);
            if (hit) {
                state.selected = hit;
                renderNotePanel(hit);
                openInSearch(hit);
            } else {
                state.selected = null;
                renderNotePanel(null);
            }
            draw();
        }
    }

    function onWheel(evt) {
        evt.preventDefault();
        const p = pointerPos(evt);
        const old = state.camera.k;
        const factor = evt.deltaY < 0 ? 1.08 : 0.92;
        const next = Math.max(0.2, Math.min(4.2, old * factor));
        if (next === old) return;

        const worldX = (p.x - state.camera.x) / old;
        const worldY = (p.y - state.camera.y) / old;
        state.camera.k = next;
        state.camera.x = p.x - (worldX * next);
        state.camera.y = p.y - (worldY * next);
        draw();
    }

    window.addEventListener("resize", resizeCanvas);
    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointermove", onPointerMove);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointercancel", onPointerUp);
    canvas.addEventListener("wheel", onWheel, { passive: false });

    resizeCanvas();
    loadData();
});
</script>
</body>
</html>
