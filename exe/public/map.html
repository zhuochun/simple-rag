<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognition Map</title>
    <style>
        :root {
            --bg: #0f1217;
            --panel: #141922d9;
            --panel-border: #2a3444;
            --text: #e8edf8;
            --muted: #93a2bc;
            --accent: #f3f6ff;
            --dot: #eef2ff;
            --dot-active: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            color: var(--text);
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at 14% 10%, #1b2230 0%, #1b223000 36%),
                radial-gradient(circle at 82% 24%, #1c2535 0%, #1c253500 38%),
                linear-gradient(180deg, #10141c 0%, #0b0f15 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.3;
            background-image:
                linear-gradient(to right, rgba(124, 140, 168, 0.07) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(124, 140, 168, 0.06) 1px, transparent 1px);
            background-size: 38px 38px;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            background: #121823f2;
            border-bottom: 1px solid #263244;
            backdrop-filter: blur(8px);
        }

        .top-nav a {
            color: #d3deef;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 8px;
        }

        .top-nav a.active,
        .top-nav a:hover {
            color: #ffffff;
            background: #243248;
        }

        #layout {
            height: calc(100vh - 53px);
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            min-height: 480px;
        }

        #map-stage {
            position: relative;
            overflow: hidden;
            cursor: grab;
        }

        #map-stage.panning {
            cursor: grabbing;
        }

        #map-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #status-chip {
            position: absolute;
            left: 14px;
            top: 14px;
            border: 1px solid #314159;
            background: #111824d6;
            color: var(--muted);
            font-size: 12px;
            border-radius: 999px;
            padding: 6px 11px;
            pointer-events: none;
        }

        #title-chip {
            position: absolute;
            left: 14px;
            bottom: 14px;
            letter-spacing: 0.34em;
            font-weight: 700;
            color: #f2f6ff;
            font-size: 26px;
            opacity: 0.85;
            pointer-events: none;
        }

        #sidebar {
            border-left: 1px solid #263244;
            background: #101721d9;
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .section {
            border-bottom: 1px solid #243245;
            padding: 12px;
        }

        .section h2 {
            margin: 0 0 8px;
            font-size: 13px;
            color: #ced7e9;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #meta {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
        }

        #paths-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        #paths-list li {
            border: 1px solid #354764;
            border-radius: 999px;
            padding: 4px 9px;
            font-size: 12px;
            color: #d7e1f3;
            background: #1a2535;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        #paths-list input[type="checkbox"] {
            accent-color: #c9d9ff;
        }

        .debug-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
        }

        .debug-toggle {
            border: 1px solid #354764;
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 12px;
            color: #d7e1f3;
            background: #172232;
            display: flex;
            gap: 7px;
            align-items: center;
            min-width: 0;
        }

        .debug-toggle input {
            accent-color: #d8dee9;
            margin: 0;
        }

        #note-panel {
            padding: 12px;
            overflow: auto;
            min-height: 0;
            flex: 1;
            line-height: 1.45;
        }

        #note-panel .empty {
            color: var(--muted);
            font-size: 13px;
        }

        #note-title {
            margin: 0 0 8px;
            font-size: 14px;
            color: #f2f6ff;
        }

        #note-meta {
            margin-bottom: 10px;
            font-size: 12px;
            color: var(--muted);
        }

        #note-body {
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 13px;
            color: #e4ebf9;
        }

        #note-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }

        .btn {
            border: 1px solid #405471;
            background: #1a2a3f;
            color: #f1f5ff;
            border-radius: 8px;
            padding: 7px 10px;
            font: inherit;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn:hover {
            background: #22354f;
        }

        #tooltip {
            position: absolute;
            z-index: 30;
            pointer-events: none;
            transform: translate(10px, 10px);
            max-width: 280px;
            border: 1px solid #33455f;
            background: #101823ed;
            color: #dde6f7;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 120ms ease;
        }

        #tooltip.show {
            opacity: 1;
        }

        @media (max-width: 980px) {
            #layout {
                grid-template-columns: 1fr;
                grid-template-rows: minmax(410px, 56vh) minmax(250px, 1fr);
            }
            #sidebar {
                border-left: 0;
                border-top: 1px solid #263244;
            }
            #title-chip {
                font-size: 18px;
                letter-spacing: 0.22em;
            }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="q.html">Search</a>
        <a href="graph.html">Graph</a>
        <a href="map.html" class="active">Map</a>
        <a href="reader.html">Reader</a>
        <a href="duplicate.html">Duplicates</a>
        <a href="random.html">Random</a>
    </nav>
    <div id="layout">
        <section id="map-stage">
            <canvas id="map-canvas"></canvas>
            <div id="status-chip">Loading map...</div>
            <div id="title-chip">COGNITIVE MAP</div>
            <div id="tooltip"></div>
        </section>
        <aside id="sidebar">
            <div class="section">
                <h2>Map Stats</h2>
                <div id="meta"></div>
            </div>
            <div class="section">
                <h2>Path Filter</h2>
                <ul id="paths-list"></ul>
            </div>
            <div class="section">
                <h2>Debug Layers</h2>
                <div id="debug-controls" class="debug-controls">
                    <label class="debug-toggle"><input type="checkbox" data-debug="dots" checked> Dots</label>
                    <label class="debug-toggle"><input type="checkbox" data-debug="contours" checked> Contours</label>
                    <label class="debug-toggle"><input type="checkbox" data-debug="relief" checked> Relief</label>
                    <label class="debug-toggle"><input type="checkbox" data-debug="labels" checked> Labels</label>
                    <label class="debug-toggle"><input type="checkbox" data-debug="bridges"> Bridges</label>
                    <label class="debug-toggle"><input type="checkbox" data-debug="communityColors"> Colors</label>
                </div>
            </div>
            <div id="note-panel">
                <div class="empty">Click any note dot to open q.html exploration and preview it here.</div>
            </div>
        </aside>
    </div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const canvas = document.getElementById("map-canvas");
    const stage = document.getElementById("map-stage");
    const tooltip = document.getElementById("tooltip");
    const statusChip = document.getElementById("status-chip");
    const meta = document.getElementById("meta");
    const pathsList = document.getElementById("paths-list");
    const debugControls = document.getElementById("debug-controls");
    const notePanel = document.getElementById("note-panel");
    const ctx = canvas.getContext("2d");

    const state = {
        data: null,
        notes: [],
        clusters: [],
        edges: [],
        noteByIndex: new Map(),
        clusterById: new Map(),
        terrain: null,
        camera: { x: 0, y: 0, k: 1 },
        hovered: null,
        selected: null,
        dragging: false,
        dragPointerId: null,
        dragMoved: false,
        dragStart: { x: 0, y: 0 },
        lastPointer: { x: 0, y: 0 },
        visibleLookups: new Set(),
        filterReady: false,
        visibleCache: null,
        spatialIndex: null,
        spatialCellSize: 48,
        debug: {
            dots: true,
            contours: true,
            relief: true,
            labels: true,
            bridges: false,
            communityColors: false
        },
        drawPending: false
    };

    const COMMUNITY_COLORS = [
        "#7dd3fc", "#fbbf24", "#86efac", "#f0abfc", "#fb7185", "#a78bfa",
        "#67e8f9", "#fdba74", "#bef264", "#c4b5fd", "#f9a8d4", "#93c5fd"
    ];

    const TERRAIN_LEVEL_RATIOS = [
        0.038, 0.05, 0.064, 0.081, 0.102,
        0.128, 0.158, 0.193, 0.234, 0.282,
        0.337, 0.4, 0.47, 0.548, 0.634,
        0.728, 0.83, 0.94
    ];

    function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
    }

    function markTerrainDirty() {
        state.terrain = null;
    }

    function invalidateVisibleNotes() {
        state.visibleCache = null;
        state.spatialIndex = null;
    }

    function hashString(text) {
        let h = 0;
        const t = String(text || "");
        for (let i = 0; i < t.length; i += 1) {
            h = ((h << 5) - h) + t.charCodeAt(i);
            h |= 0;
        }
        return Math.abs(h);
    }

    function api(path) {
        const base = window.location.origin && window.location.origin.startsWith("http")
            ? window.location.origin
            : "http://localhost:4567";
        return `${base}${path}`;
    }

    function setStatus(text) {
        statusChip.textContent = text;
    }

    function bindDebugControls() {
        debugControls.querySelectorAll("input[data-debug]").forEach(input => {
            const key = input.dataset.debug;
            input.checked = !!state.debug[key];
        });
        debugControls.addEventListener("change", evt => {
            const input = evt.target;
            if (!input || !input.dataset || !input.dataset.debug) return;

            state.debug[input.dataset.debug] = input.checked;
            requestDraw();
            setStatus("Updated debug layers");
        });
    }

    function requestDraw() {
        if (state.drawPending) return;
        state.drawPending = true;
        window.requestAnimationFrame(() => {
            state.drawPending = false;
            draw();
        });
    }

    function resizeCanvas() {
        const rect = stage.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(rect.width * ratio));
        canvas.height = Math.max(1, Math.floor(rect.height * ratio));
        canvas.style.width = `${rect.width}px`;
        canvas.style.height = `${rect.height}px`;
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        requestDraw();
    }

    function worldToScreen(x, y) {
        return {
            x: x * state.camera.k + state.camera.x,
            y: y * state.camera.k + state.camera.y
        };
    }

    function screenToWorld(x, y) {
        return {
            x: (x - state.camera.x) / state.camera.k,
            y: (y - state.camera.y) / state.camera.k
        };
    }

    function mapBounds() {
        if (!state.data) {
            return { width: 1000, height: 700 };
        }
        return {
            width: Number(state.data.width || 1000),
            height: Number(state.data.height || 700)
        };
    }

    function resetView() {
        const world = mapBounds();
        const bounds = terrainViewBounds() || {
            minX: 0,
            minY: 0,
            maxX: world.width,
            maxY: world.height
        };
        const width = stage.clientWidth || 1;
        const height = stage.clientHeight || 1;
        const contentWidth = Math.max(1, bounds.maxX - bounds.minX);
        const contentHeight = Math.max(1, bounds.maxY - bounds.minY);
        const centerX = (bounds.minX + bounds.maxX) / 2;
        const centerY = (bounds.minY + bounds.maxY) / 2;
        const kx = (width * 0.9) / contentWidth;
        const ky = (height * 0.88) / contentHeight;
        state.camera.k = Math.max(0.2, Math.min(3.2, Math.min(kx, ky) * 1.16));
        state.camera.x = (width / 2) - (centerX * state.camera.k);
        state.camera.y = (height / 2) - (centerY * state.camera.k);
    }

    function noteVisible(note) {
        if (!state.filterReady) return true;
        return state.visibleLookups.has(note.lookup);
    }

    function visibleNotes() {
        if (!state.visibleCache) {
            state.visibleCache = state.notes.filter(noteVisible);
        }
        return state.visibleCache;
    }

    function clusterVisibleCount() {
        const map = new Map();
        visibleNotes().forEach(note => {
            map.set(note.clusterId, (map.get(note.clusterId) || 0) + 1);
        });
        return map;
    }

    function communityColor(id, alpha = 1) {
        const text = String(id || "0");
        let hash = 0;
        for (let i = 0; i < text.length; i += 1) {
            hash = ((hash << 5) - hash) + text.charCodeAt(i);
            hash |= 0;
        }
        const hex = COMMUNITY_COLORS[Math.abs(hash) % COMMUNITY_COLORS.length];
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function edgeVisible(edge) {
        const a = state.noteByIndex.get(edge.sourceIndex);
        const b = state.noteByIndex.get(edge.targetIndex);
        return a && b && noteVisible(a) && noteVisible(b);
    }

    function drawBridgeEdges() {
        if (!Array.isArray(state.edges) || state.edges.length === 0) return;
        if (!state.debug.bridges) return;
        const hoveredIndex = state.hovered ? state.hovered.index : null;
        const hasHover = hoveredIndex !== undefined && hoveredIndex !== null;
        const bridgeEdges = state.edges
            .filter(edge => edge.bridge || edge.sameCommunity === false)
            .filter(edge => {
                if (!edgeVisible(edge)) return false;
                if (!hasHover) return true;
                return edge.sourceIndex === hoveredIndex || edge.targetIndex === hoveredIndex;
            })
            .sort((a, b) => Number(b.weight || 0) - Number(a.weight || 0));
        const visibleEdges = hasHover ? bridgeEdges.slice(0, 5) : bridgeEdges;
        if (visibleEdges.length === 0) return;

        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.setLineDash(hasHover ? [5, 5] : [2, 7]);
        visibleEdges.forEach(edge => {
            const touchesHover = hasHover && (edge.sourceIndex === hoveredIndex || edge.targetIndex === hoveredIndex);
            const a = state.noteByIndex.get(edge.sourceIndex);
            const b = state.noteByIndex.get(edge.targetIndex);
            const pa = worldToScreen(a.x, a.y);
            const pb = worldToScreen(b.x, b.y);
            const dx = pb.x - pa.x;
            const dy = pb.y - pa.y;
            const dist = Math.max(1, Math.sqrt((dx * dx) + (dy * dy)));
            const bendSign = edge.sourceIndex < edge.targetIndex ? 1 : -1;
            const bend = clamp(dist * 0.12, 12, 44) * bendSign;
            const cx = (pa.x + pb.x) / 2 + (-dy / dist) * bend;
            const cy = (pa.y + pb.y) / 2 + (dx / dist) * bend;

            ctx.beginPath();
            ctx.moveTo(pa.x, pa.y);
            ctx.quadraticCurveTo(cx, cy, pb.x, pb.y);
            ctx.strokeStyle = touchesHover ? "rgba(245, 249, 255, 0.26)" : "rgba(210, 220, 235, 0.06)";
            ctx.lineWidth = Math.max(0.45, Math.min(1.15, 0.45 + (Number(edge.weight || 0) * (touchesHover ? 0.75 : 0.38))));
            ctx.stroke();
        });
        ctx.setLineDash([]);
        ctx.restore();
    }

    function drawBackgroundGrid() {
        const width = stage.clientWidth;
        const height = stage.clientHeight;
        ctx.save();
        ctx.strokeStyle = "rgba(160,180,220,0.08)";
        ctx.lineWidth = 1;
        const step = 44;
        const offsetX = state.camera.x % step;
        const offsetY = state.camera.y % step;
        ctx.beginPath();
        for (let x = offsetX; x < width; x += step) {
            ctx.moveTo(x, 0);
            ctx.lineTo(x, height);
        }
        for (let y = offsetY; y < height; y += step) {
            ctx.moveTo(0, y);
            ctx.lineTo(width, y);
        }
        ctx.stroke();
        ctx.restore();
    }

    function edgePoint(edge, x0, y0, x1, y1, tl, tr, br, bl, level) {
        function interp(ax, ay, av, bx, by, bv) {
            const span = bv - av;
            const t = Math.abs(span) < 1e-9 ? 0.5 : clamp((level - av) / span, 0, 1);
            return [
                ax + ((bx - ax) * t),
                ay + ((by - ay) * t)
            ];
        }

        if (edge === 0) return interp(x0, y0, tl, x1, y0, tr);
        if (edge === 1) return interp(x1, y0, tr, x1, y1, br);
        if (edge === 2) return interp(x0, y1, bl, x1, y1, br);
        return interp(x0, y0, tl, x0, y1, bl);
    }

    function buildContourSegments(values, cols, rows, originX, originY, cellSize, level) {
        const segments = [];

        function addSegment(edgeA, edgeB, x0, y0, x1, y1, tl, tr, br, bl) {
            const a = edgePoint(edgeA, x0, y0, x1, y1, tl, tr, br, bl, level);
            const b = edgePoint(edgeB, x0, y0, x1, y1, tl, tr, br, bl, level);
            segments.push([a[0], a[1], b[0], b[1]]);
        }

        for (let row = 0; row < rows - 1; row += 1) {
            const y0 = originY + (row * cellSize);
            const y1 = y0 + cellSize;
            for (let col = 0; col < cols - 1; col += 1) {
                const x0 = originX + (col * cellSize);
                const x1 = x0 + cellSize;
                const idx = (row * cols) + col;
                const tl = values[idx];
                const tr = values[idx + 1];
                const bl = values[idx + cols];
                const br = values[idx + cols + 1];

                let cellCase = 0;
                if (tl >= level) cellCase |= 1;
                if (tr >= level) cellCase |= 2;
                if (br >= level) cellCase |= 4;
                if (bl >= level) cellCase |= 8;

                if (cellCase === 0 || cellCase === 15) continue;

                const center = (tl + tr + br + bl) / 4;
                switch (cellCase) {
                    case 1:
                    case 14:
                        addSegment(3, 0, x0, y0, x1, y1, tl, tr, br, bl);
                        break;
                    case 2:
                    case 13:
                        addSegment(0, 1, x0, y0, x1, y1, tl, tr, br, bl);
                        break;
                    case 3:
                    case 12:
                        addSegment(3, 1, x0, y0, x1, y1, tl, tr, br, bl);
                        break;
                    case 4:
                    case 11:
                        addSegment(1, 2, x0, y0, x1, y1, tl, tr, br, bl);
                        break;
                    case 5:
                        if (center >= level) {
                            addSegment(0, 1, x0, y0, x1, y1, tl, tr, br, bl);
                            addSegment(2, 3, x0, y0, x1, y1, tl, tr, br, bl);
                        } else {
                            addSegment(3, 0, x0, y0, x1, y1, tl, tr, br, bl);
                            addSegment(1, 2, x0, y0, x1, y1, tl, tr, br, bl);
                        }
                        break;
                    case 6:
                    case 9:
                        addSegment(0, 2, x0, y0, x1, y1, tl, tr, br, bl);
                        break;
                    case 7:
                    case 8:
                        addSegment(3, 2, x0, y0, x1, y1, tl, tr, br, bl);
                        break;
                    case 10:
                        if (center >= level) {
                            addSegment(3, 0, x0, y0, x1, y1, tl, tr, br, bl);
                            addSegment(1, 2, x0, y0, x1, y1, tl, tr, br, bl);
                        } else {
                            addSegment(0, 1, x0, y0, x1, y1, tl, tr, br, bl);
                            addSegment(2, 3, x0, y0, x1, y1, tl, tr, br, bl);
                        }
                        break;
                }
            }
        }

        return segments;
    }

    function buildTerrain(notes) {
        const bounds = mapBounds();
        const padding = 90;
        const cellSize = Math.round(clamp(Math.min(bounds.width, bounds.height) / 96, 14, 22));
        const sigma = clamp(Math.sqrt(bounds.width * bounds.height) / 48, cellSize * 2.05, 54);
        const radius = sigma * 2.75;
        const originX = -padding;
        const originY = -padding;
        const cols = Math.ceil((bounds.width + (padding * 2)) / cellSize) + 1;
        const rows = Math.ceil((bounds.height + (padding * 2)) / cellSize) + 1;
        const values = new Float32Array(cols * rows);

        notes.forEach(note => {
            const nx = Number(note.x);
            const ny = Number(note.y);
            if (!Number.isFinite(nx) || !Number.isFinite(ny)) return;

            const internal = Math.max(0, Number(note.internalWeight || 0));
            const external = Math.max(0, Number(note.externalWeight || 0));
            const total = internal + external;
            const coreRatio = total > 0 ? internal / total : 0.5;
            const degreeBoost = Math.min(0.28, Math.log1p(Math.max(0, Number(note.degree || 0))) / 9);
            const bridgePenalty = Math.min(0.22, Math.max(0, Number(note.bridgeScore || 0)) * 0.22);
            const densityWeight = clamp(0.62 + (coreRatio * 0.56) + degreeBoost - bridgePenalty, 0.42, 1.48);

            const minCol = clamp(Math.floor((nx - radius - originX) / cellSize), 0, cols - 1);
            const maxCol = clamp(Math.ceil((nx + radius - originX) / cellSize), 0, cols - 1);
            const minRow = clamp(Math.floor((ny - radius - originY) / cellSize), 0, rows - 1);
            const maxRow = clamp(Math.ceil((ny + radius - originY) / cellSize), 0, rows - 1);

            for (let row = minRow; row <= maxRow; row += 1) {
                const gy = originY + (row * cellSize);
                const dy = (gy - ny) / sigma;
                const dy2 = dy * dy;
                const rowOffset = row * cols;
                for (let col = minCol; col <= maxCol; col += 1) {
                    const gx = originX + (col * cellSize);
                    const dx = (gx - nx) / sigma;
                    const dist2 = (dx * dx) + dy2;
                    if (dist2 <= 9) {
                        values[rowOffset + col] += Math.exp(-0.5 * dist2) * densityWeight;
                    }
                }
            }
        });

        let max = 0;
        for (let i = 0; i < values.length; i += 1) {
            if (values[i] > max) max = values[i];
        }

        const contours = max <= 0
            ? []
            : TERRAIN_LEVEL_RATIOS.map((ratio, index) => {
                const level = max * ratio;
                return {
                    ratio,
                    index,
                    level,
                    major: index % 4 === 0,
                    segments: buildContourSegments(values, cols, rows, originX, originY, cellSize, level)
                };
            });

        return { values, cols, rows, originX, originY, cellSize, max, contours };
    }

    function currentTerrain() {
        if (!state.terrain) {
            state.terrain = buildTerrain(visibleNotes());
        }
        return state.terrain;
    }

    function terrainViewBounds() {
        const terrain = currentTerrain();
        if (!terrain || terrain.max <= 0) return null;

        const threshold = terrain.max * 0.052;
        let minX = Infinity;
        let minY = Infinity;
        let maxX = -Infinity;
        let maxY = -Infinity;

        for (let row = 0; row < terrain.rows; row += 1) {
            for (let col = 0; col < terrain.cols; col += 1) {
                const value = terrain.values[(row * terrain.cols) + col];
                if (value < threshold) continue;

                const x = terrain.originX + (col * terrain.cellSize);
                const y = terrain.originY + (row * terrain.cellSize);
                minX = Math.min(minX, x);
                minY = Math.min(minY, y);
                maxX = Math.max(maxX, x + terrain.cellSize);
                maxY = Math.max(maxY, y + terrain.cellSize);
            }
        }

        if (!Number.isFinite(minX)) return null;

        const world = mapBounds();
        const pad = terrain.cellSize * 3;
        return {
            minX: clamp(minX - pad, 0, world.width),
            minY: clamp(minY - pad, 0, world.height),
            maxX: clamp(maxX + pad, 0, world.width),
            maxY: clamp(maxY + pad, 0, world.height)
        };
    }

    function drawContours() {
        if (!state.debug.contours) return;
        const terrain = currentTerrain();
        if (!terrain || terrain.max <= 0) return;

        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        terrain.contours.forEach(contour => {
            if (contour.segments.length === 0) return;

            const depth = terrain.contours.length <= 1
                ? 1
                : contour.index / (terrain.contours.length - 1);
            const alpha = 0.026 + (Math.pow(depth, 1.32) * 0.38);
            const majorBoost = contour.major && depth > 0.22 ? 0.07 : 0;

            ctx.beginPath();
            ctx.strokeStyle = `rgba(232, 238, 250, ${Math.min(0.52, alpha + majorBoost)})`;
            ctx.lineWidth = 0.46 + (depth * 0.76) + (contour.major && depth > 0.22 ? 0.18 : 0);

            contour.segments.forEach(segment => {
                const a = worldToScreen(segment[0], segment[1]);
                const b = worldToScreen(segment[2], segment[3]);
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
            });
            ctx.stroke();
        });

        ctx.restore();
    }

    function drawPeakMarker(x, y, size) {
        ctx.beginPath();
        ctx.moveTo(x, y - size);
        ctx.lineTo(x + (size * 0.86), y + (size * 0.62));
        ctx.lineTo(x - (size * 0.86), y + (size * 0.62));
        ctx.closePath();
        ctx.fillStyle = "rgba(244, 248, 255, 0.58)";
        ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
        ctx.lineWidth = 1;
        ctx.fill();
        ctx.stroke();
    }

    function terrainValueAt(terrain, x, y) {
        if (!terrain || terrain.max <= 0) return 0;
        const col = clamp(Math.round((x - terrain.originX) / terrain.cellSize), 0, terrain.cols - 1);
        const row = clamp(Math.round((y - terrain.originY) / terrain.cellSize), 0, terrain.rows - 1);
        return terrain.values[(row * terrain.cols) + col] || 0;
    }

    function nearestTerrainPeak(terrain, x, y, radiusCells = 5) {
        if (!terrain || terrain.max <= 0) return { x, y, value: 0 };
        const centerCol = clamp(Math.round((x - terrain.originX) / terrain.cellSize), 0, terrain.cols - 1);
        const centerRow = clamp(Math.round((y - terrain.originY) / terrain.cellSize), 0, terrain.rows - 1);
        let bestCol = centerCol;
        let bestRow = centerRow;
        let bestScore = -Infinity;
        let bestValue = 0;

        for (let row = Math.max(0, centerRow - radiusCells); row <= Math.min(terrain.rows - 1, centerRow + radiusCells); row += 1) {
            for (let col = Math.max(0, centerCol - radiusCells); col <= Math.min(terrain.cols - 1, centerCol + radiusCells); col += 1) {
                const value = terrain.values[(row * terrain.cols) + col] || 0;
                const dist2 = ((col - centerCol) * (col - centerCol)) + ((row - centerRow) * (row - centerRow));
                const score = value - (Math.sqrt(dist2) * terrain.max * 0.012);
                if (score > bestScore) {
                    bestScore = score;
                    bestValue = value;
                    bestCol = col;
                    bestRow = row;
                }
            }
        }

        return {
            x: terrain.originX + (bestCol * terrain.cellSize),
            y: terrain.originY + (bestRow * terrain.cellSize),
            value: bestValue
        };
    }

    function clusterLabelAnchors() {
        const terrain = currentTerrain();
        const anchors = new Map();
        visibleNotes().forEach(note => {
            const clusterId = note.clusterId;
            if (!clusterId) return;

            const internal = Math.max(0, Number(note.internalWeight || 0));
            const external = Math.max(0, Number(note.externalWeight || 0));
            const total = internal + external;
            const coreRatio = total > 0 ? internal / total : 0.5;
            const bridgeScore = Math.max(0, Number(note.bridgeScore || 0));
            const degree = Math.max(0, Number(note.degree || 0));
            const coreWeight = clamp(0.55 + coreRatio + (Math.log1p(degree) / 7) - (bridgeScore * 0.45), 0.2, 2.2);
            const density = terrainValueAt(terrain, Number(note.x), Number(note.y));
            const peakScore = density * coreWeight;

            let anchor = anchors.get(clusterId);
            if (!anchor) {
                anchor = { x: 0, y: 0, count: 0, score: 0, bestScore: -Infinity, bestDensity: 0 };
                anchors.set(clusterId, anchor);
            }
            anchor.count += 1;
            anchor.score += peakScore;
            if (peakScore > anchor.bestScore) {
                anchor.bestScore = peakScore;
                anchor.bestDensity = density;
                anchor.x = Number(note.x);
                anchor.y = Number(note.y);
            }
        });

        anchors.forEach(anchor => {
            if (Number.isFinite(anchor.bestScore)) {
                const peak = nearestTerrainPeak(terrain, anchor.x, anchor.y);
                anchor.x = peak.x;
                anchor.y = peak.y;
                anchor.score = peak.value + (anchor.bestDensity * 0.4) + (Math.log1p(anchor.count) * terrain.max * 0.02);
            }
        });
        return anchors;
    }

    function buildClusterLabelLines(cluster, fontSize, compact) {
        const primaryFont = `700 ${fontSize}px "Segoe UI", "Microsoft YaHei", sans-serif`;
        const subtitleFont = `500 ${Math.max(9, fontSize - 2)}px "Segoe UI", "Microsoft YaHei", sans-serif`;
        const chipFont = `500 ${Math.max(8.5, fontSize - 3)}px "Segoe UI", "Microsoft YaHei", sans-serif`;

        ctx.font = primaryFont;
        const rawLabel = displayClusterLabel(cluster.primaryLabel || cluster.label, "");
        if (!rawLabel) return [];

        const lines = [{
            text: fitLabelToWidth(rawLabel, compact ? 118 : 156),
            font: primaryFont,
            alpha: compact ? 0.76 : 0.9,
            height: fontSize + 2
        }];
        const subtitle = displayClusterLabel(cluster.subtitle, "");
        if (!compact && subtitle && state.camera.k >= 0.36) {
            ctx.font = subtitleFont;
            lines.push({
                text: fitLabelToWidth(subtitle, 190),
                font: subtitleFont,
                alpha: 0.58,
                height: Math.max(10, fontSize - 1)
            });
        }
        const chips = Array.isArray(cluster.keywordChips) ? cluster.keywordChips.filter(Boolean).slice(0, 3) : [];
        if (!compact && chips.length > 0 && state.camera.k >= 0.62) {
            ctx.font = chipFont;
            lines.push({
                text: fitLabelToWidth(chips.join(" / "), 196),
                font: chipFont,
                alpha: 0.42,
                height: Math.max(9, fontSize - 2)
            });
        }
        return lines;
    }

    function drawLabelCandidate(item, placed, stageWidth, stageHeight, compact) {
        const cluster = item.cluster;
        const activeCount = item.count;
        if (state.camera.k < 0.22) return false;
        if (activeCount < 8 && state.camera.k < 0.7) return false;
        if (activeCount < 3 && state.camera.k < 1.4) return false;

        const p = worldToScreen(item.anchor.x, item.anchor.y);
        const fontSize = compact
            ? Math.max(9.2, Math.min(10.8, 8.6 + Math.sqrt(activeCount) * 0.22))
            : Math.max(10, Math.min(12.4, 9.6 + Math.sqrt(activeCount) * 0.32));
        const markerSize = compact ? 3.2 : Math.max(3.8, Math.min(5.4, fontSize * 0.4));
        const lines = buildClusterLabelLines(cluster, fontSize, compact);
        if (lines.length === 0) return false;

        const width = lines.reduce((max, line) => {
            ctx.font = line.font;
            return Math.max(max, ctx.measureText(line.text).width);
        }, 0);
        const labelHeight = lines.reduce((sum, line) => sum + line.height, 0);
        const labelY = p.y + markerSize + (compact ? 3 : 5);
        const box = {
            left: p.x - (width / 2) - (compact ? 4 : 7),
            right: p.x + (width / 2) + (compact ? 4 : 7),
            top: labelY - 3,
            bottom: labelY + labelHeight + 3
        };

        if (
            box.left < 6 ||
            box.right > stageWidth - 6 ||
            box.top < 6 ||
            box.bottom > stageHeight - 6 ||
            placed.some(existing => boxesOverlap(box, existing))
        ) {
            return false;
        }
        placed.push(box);

        ctx.shadowColor = "rgba(4, 8, 16, 0.78)";
        ctx.shadowBlur = compact ? 4 : 5;
        drawPeakMarker(p.x, p.y - markerSize - 1, markerSize);

        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        let y = labelY;
        lines.forEach(line => {
            ctx.font = line.font;
            ctx.fillStyle = `rgba(246, 250, 255, ${line.alpha})`;
            ctx.fillText(line.text, p.x, y);
            y += line.height;
        });
        return true;
    }

    function drawClusterLabels() {
        if (!state.debug.labels) return;
        const anchors = clusterLabelAnchors();
        const labelCandidates = state.clusters
            .map(cluster => {
                const anchor = anchors.get(cluster.id);
                return {
                    cluster,
                    anchor,
                    count: anchor ? anchor.count : 0,
                    score: anchor ? anchor.score : 0
                };
            })
            .filter(item => item.count > 0)
            .sort((a, b) => (b.score - a.score) || (b.count - a.count))
            .slice(0, 60);

        ctx.save();
        const placed = [];
        const labeled = new Set();
        const stageWidth = stage.clientWidth;
        const stageHeight = stage.clientHeight;

        labelCandidates.slice(0, 22).forEach(item => {
            if (drawLabelCandidate(item, placed, stageWidth, stageHeight, false)) {
                labeled.add(item.cluster.id);
            }
        });
        labelCandidates.forEach(item => {
            if (labeled.has(item.cluster.id)) return;
            if (drawLabelCandidate(item, placed, stageWidth, stageHeight, true)) {
                labeled.add(item.cluster.id);
            }
        });
        ctx.restore();
    }

    function drawTerrainRelief() {
        if (!state.debug.relief) return;
        const terrain = currentTerrain();
        if (!terrain || terrain.max <= 0) return;

        const step = state.camera.k < 0.5 ? 2 : 1;
        const screenSize = Math.max(1, terrain.cellSize * state.camera.k * step);

        ctx.save();
        for (let row = 0; row < terrain.rows; row += step) {
            for (let col = 0; col < terrain.cols; col += step) {
                const value = terrain.values[(row * terrain.cols) + col];
                if (value <= terrain.max * 0.025) continue;

                const t = value / terrain.max;
                const alpha = 0.012 + (Math.pow(t, 1.35) * 0.055);
                const p = worldToScreen(
                    terrain.originX + (col * terrain.cellSize),
                    terrain.originY + (row * terrain.cellSize)
                );
                ctx.fillStyle = `rgba(236, 242, 255, ${alpha})`;
                ctx.fillRect(p.x, p.y, screenSize, screenSize);
            }
        }
        ctx.restore();
    }

    function drawNotes() {
        if (!state.debug.dots && !state.debug.bridges) return;
        const visible = visibleNotes();
        const maxPoints = state.camera.k < 0.34
            ? 2300
            : (state.camera.k < 0.55 ? 4200 : Number.MAX_SAFE_INTEGER);
        const step = visible.length > maxPoints ? Math.ceil(visible.length / maxPoints) : 1;

        for (let i = 0; i < visible.length; i += step) {
            const note = visible[i];
            const bridgeScore = Math.max(0, Number(note.bridgeScore || 0));
            if (!state.debug.dots && bridgeScore < 0.18) continue;

            const p = worldToScreen(note.x, note.y);
            const isHover = state.hovered && state.hovered.id === note.id;
            const isSelected = state.selected && state.selected.id === note.id;
            const bridgeBoost = Math.min(1.8, bridgeScore * 1.8);
            const radius = isSelected ? 3.2 : (isHover ? 2.4 : 1.05 + bridgeBoost);

            ctx.beginPath();
            ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
            ctx.fillStyle = isSelected
                ? "rgba(255, 255, 255, 0.88)"
                : (isHover
                    ? "rgba(250, 253, 255, 0.78)"
                    : (state.debug.communityColors
                        ? communityColor(note.communityId || note.clusterId, 0.44)
                        : `rgba(218, 225, 232, ${0.30 + Math.min(bridgeScore * 0.32, 0.24)})`));
            ctx.fill();
            if (state.debug.bridges && bridgeScore >= 0.18) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, radius + 1.3, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.24)";
                ctx.lineWidth = 0.65;
                ctx.stroke();
            }
        }
    }

    function draw() {
        const width = stage.clientWidth;
        const height = stage.clientHeight;
        ctx.clearRect(0, 0, width, height);
        drawBackgroundGrid();
        drawTerrainRelief();
        drawContours();
        drawBridgeEdges();
        drawNotes();
        drawClusterLabels();
    }

    function pointerPos(evt) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: evt.clientX - rect.left,
            y: evt.clientY - rect.top
        };
    }

    function nearestNote(screenX, screenY) {
        const world = screenToWorld(screenX, screenY);
        let best = null;
        let bestD2 = Infinity;
        const hitRadiusWorld = 9 / Math.max(state.camera.k, 0.001);
        const hitRadius2 = hitRadiusWorld * hitRadiusWorld;
        const index = spatialIndex();
        const cellSize = state.spatialCellSize;
        const minCx = Math.floor((world.x - hitRadiusWorld) / cellSize);
        const maxCx = Math.floor((world.x + hitRadiusWorld) / cellSize);
        const minCy = Math.floor((world.y - hitRadiusWorld) / cellSize);
        const maxCy = Math.floor((world.y + hitRadiusWorld) / cellSize);

        for (let cx = minCx; cx <= maxCx; cx += 1) {
            for (let cy = minCy; cy <= maxCy; cy += 1) {
                const bucket = index.get(`${cx}:${cy}`);
                if (!bucket) continue;
                bucket.forEach(note => {
                    const dx = note.x - world.x;
                    const dy = note.y - world.y;
                    const d2 = (dx * dx) + (dy * dy);
                    if (d2 < bestD2 && d2 <= hitRadius2) {
                        best = note;
                        bestD2 = d2;
                    }
                });
            }
        }
        return best;
    }

    function spatialIndex() {
        if (state.spatialIndex) return state.spatialIndex;

        const index = new Map();
        const cellSize = state.spatialCellSize;
        visibleNotes().forEach(note => {
            const cx = Math.floor(note.x / cellSize);
            const cy = Math.floor(note.y / cellSize);
            const key = `${cx}:${cy}`;
            if (!index.has(key)) index.set(key, []);
            index.get(key).push(note);
        });
        state.spatialIndex = index;
        return index;
    }

    function notePreviewText(note, max = 260) {
        return summarizeText(note && (note.snippet || note.text), max);
    }

    function appendTextLine(parent, label, value) {
        parent.appendChild(document.createTextNode(`${label}: ${value}`));
        parent.appendChild(document.createElement("br"));
    }

    function mapNoteRef(note) {
        return {
            lookup: note.lookup,
            path: note.path,
            chunk: note.chunk,
            hash: note.hash,
            title: note.title,
            snippet: notePreviewText(note, 360)
        };
    }

    function clusterForNote(note) {
        return state.clusterById.get(note.clusterId) || null;
    }

    function renderEmptyNotePanel() {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Click any note dot to open q.html exploration and preview it here.";
        notePanel.replaceChildren(empty);
    }

    function summarizeText(text, max = 260) {
        const compact = String(text || "").replace(/\s+/g, " ").trim();
        return compact.length > max ? `${compact.slice(0, max)}...` : compact;
    }

    function displayClusterLabel(label, fallback = "Mountain") {
        const cleaned = String(label || fallback)
            .replace(/<\|[^|]+\|>/g, " ")
            .replace(/[_-]+/g, " ")
            .replace(/\s+/g, " ")
            .trim();
        if (/^主题\d+$/i.test(cleaned)) return "";
        return cleaned || fallback;
    }

    function fitLabelToWidth(label, maxWidth) {
        let fitted = label;
        while (fitted.length > 4 && ctx.measureText(fitted).width > maxWidth) {
            fitted = fitted.slice(0, -1).trim();
        }
        return fitted.length < label.length ? `${fitted}...` : fitted;
    }

    function boxesOverlap(a, b) {
        return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
    }

    function renderNotePanel(note) {
        if (!note) {
            renderEmptyNotePanel();
            return;
        }

        const title = document.createElement("h3");
        title.id = "note-title";
        title.textContent = note.title || "Untitled Note";

        const metaBox = document.createElement("div");
        metaBox.id = "note-meta";
        const cluster = clusterForNote(note);
        appendTextLine(metaBox, "Path", note.lookup || "-");
        appendTextLine(metaBox, "Chunk", note.chunk ?? "-");
        appendTextLine(metaBox, "Mountain", note.clusterId || "-");
        if (cluster) {
            appendTextLine(metaBox, "Primary Label", cluster.primaryLabel || cluster.label || "-");
            appendTextLine(metaBox, "Subtitle", cluster.subtitle || "-");
            appendTextLine(metaBox, "Keyword Chips", Array.isArray(cluster.keywordChips) ? cluster.keywordChips.join(", ") : "-");
        }
        appendTextLine(metaBox, "Community", note.communityId ?? "-");
        appendTextLine(metaBox, "Degree", note.degree ?? "-");
        appendTextLine(metaBox, "Internal Weight", note.internalWeight ?? "-");
        appendTextLine(metaBox, "External Weight", note.externalWeight ?? "-");
        appendTextLine(metaBox, "Bridge Score", note.bridgeScore ?? "-");
        if (note.rawX !== null && note.rawX !== undefined && note.rawY !== null && note.rawY !== undefined) {
            appendTextLine(metaBox, "Raw XY", `${note.rawX}, ${note.rawY}`);
        }

        const body = document.createElement("div");
        body.id = "note-body";
        body.textContent = notePreviewText(note);

        const actions = document.createElement("div");
        actions.id = "note-actions";

        const openSearchBtn = document.createElement("button");
        openSearchBtn.className = "btn";
        openSearchBtn.id = "open-search-btn";
        openSearchBtn.type = "button";
        openSearchBtn.textContent = "Explore In q.html";
        openSearchBtn.addEventListener("click", () => openInSearch(note));

        actions.appendChild(openSearchBtn);
        if (note.url) {
            const openSourceBtn = document.createElement("button");
            openSourceBtn.className = "btn";
            openSourceBtn.id = "open-source-btn";
            openSourceBtn.type = "button";
            openSourceBtn.textContent = "Open Source";
            openSourceBtn.addEventListener("click", () => window.open(note.url, "_blank", "noopener,noreferrer"));
            actions.appendChild(openSourceBtn);
        }

        notePanel.replaceChildren(title, metaBox, body, actions);
    }

    function showTooltip(note, screenX, screenY) {
        if (!note) {
            tooltip.classList.remove("show");
            return;
        }
        const strong = document.createElement("strong");
        strong.textContent = note.lookup || "-";
        tooltip.replaceChildren(strong, document.createElement("br"), document.createTextNode(notePreviewText(note, 120)));
        tooltip.style.left = `${screenX}px`;
        tooltip.style.top = `${screenY}px`;
        tooltip.classList.add("show");
    }

    function openInSearch(note) {
        const snippet = notePreviewText(note, 360);
        if (!snippet && !note.path) {
            setStatus("Cannot open empty note");
            return;
        }
        const key = `qExploreNote:${Date.now()}:${Math.random().toString(36).slice(2, 8)}`;
        localStorage.setItem(key, JSON.stringify({
            ref: mapNoteRef(note),
            fallbackNote: snippet,
            createdAt: Date.now()
        }));
        window.open(`q.html?exploreKey=${encodeURIComponent(key)}`, "_blank", "noopener,noreferrer");
    }

    function toggleLookup(name, checked) {
        if (checked) {
            state.visibleLookups.add(name);
        } else {
            state.visibleLookups.delete(name);
        }
        markTerrainDirty();
        invalidateVisibleNotes();
        state.hovered = null;
        showTooltip(null);
        requestDraw();
        setStatus(`Showing ${visibleNotes().length} notes`);
    }

    function renderPaths(lookups) {
        pathsList.replaceChildren();
        state.visibleLookups = new Set(lookups);
        state.filterReady = true;
        invalidateVisibleNotes();
        markTerrainDirty();
        lookups.forEach(name => {
            const li = document.createElement("li");
            const id = `path-${hashString(name)}`;

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.id = id;
            checkbox.checked = true;

            const label = document.createElement("label");
            label.htmlFor = id;
            label.textContent = name;

            checkbox.addEventListener("change", () => toggleLookup(name, checkbox.checked));
            li.appendChild(checkbox);
            li.appendChild(label);
            pathsList.appendChild(li);
        });
    }

    function renderMeta(data) {
        meta.replaceChildren();
        appendTextLine(meta, "Generated", new Date(data.generatedAt).toLocaleString());
        appendTextLine(meta, "Notes", data.noteCount);
        appendTextLine(meta, "Mountains", data.clusters.length);
        if (data.layout) {
            appendTextLine(meta, "Layout", data.layout.layoutMethod || data.layout.method || "-");
            appendTextLine(meta, "Retained Edges", data.layout.retainedEdgeCount ?? "-");
            appendTextLine(meta, "Bridge Edges", data.layout.bridgeEdgeCount ?? "-");
        }
        meta.appendChild(document.createTextNode(`Vector Dim: ${data.vectorDim}`));
    }

    function loadData() {
        setStatus("Loading map data...");
        fetch(api("/map_data"))
            .then(resp => {
                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}`);
                }
                return resp.json();
            })
            .then(data => {
                state.data = data;
                state.notes = Array.isArray(data.notes) ? data.notes : [];
                state.clusters = Array.isArray(data.clusters) ? data.clusters : [];
                state.edges = Array.isArray(data.edges) ? data.edges : [];
                state.noteByIndex = new Map(state.notes.map((note, idx) => [note.index ?? idx, note]));
                state.clusterById = new Map(state.clusters.map(cluster => [cluster.id, cluster]));
                invalidateVisibleNotes();
                markTerrainDirty();
                const lookups = Array.from(new Set(state.notes.map(n => n.lookup).filter(Boolean))).sort();
                renderPaths(lookups);
                renderMeta(data);
                resetView();
                requestDraw();
                setStatus(`Loaded ${state.notes.length} notes in ${state.clusters.length} mountains`);
            })
            .catch(err => {
                console.error(err);
                setStatus("Failed to load map data");
                meta.textContent = "Run `run-index-map config.json`, then refresh this page.";
            });
    }

    function onPointerDown(evt) {
        canvas.setPointerCapture(evt.pointerId);
        const p = pointerPos(evt);
        state.lastPointer = p;
        state.dragging = true;
        state.dragPointerId = evt.pointerId;
        state.dragMoved = false;
        state.dragStart = { x: p.x, y: p.y };
        stage.classList.add("panning");
    }

    function onPointerMove(evt) {
        const p = pointerPos(evt);
        state.lastPointer = p;
        const hit = nearestNote(p.x, p.y);
        state.hovered = hit;
        showTooltip(hit, p.x, p.y);

        if (state.dragging && state.dragPointerId === evt.pointerId) {
            const dx = p.x - state.dragStart.x;
            const dy = p.y - state.dragStart.y;
            if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
                state.dragMoved = true;
            }
            state.camera.x += dx;
            state.camera.y += dy;
            state.dragStart = p;
        }

        requestDraw();
    }

    function onPointerUp(evt) {
        if (state.dragPointerId !== evt.pointerId) return;
        stage.classList.remove("panning");
        state.dragging = false;
        state.dragPointerId = null;

        if (!state.dragMoved) {
            const p = pointerPos(evt);
            state.lastPointer = p;
            const hit = nearestNote(p.x, p.y);
            if (hit) {
                state.selected = hit;
                renderNotePanel(hit);
                openInSearch(hit);
            } else {
                state.selected = null;
                renderNotePanel(null);
            }
            requestDraw();
        }
    }

    function onWheel(evt) {
        evt.preventDefault();
        const p = pointerPos(evt);
        const old = state.camera.k;
        const factor = evt.deltaY < 0 ? 1.08 : 0.92;
        const next = Math.max(0.2, Math.min(4.2, old * factor));
        if (next === old) return;

        const worldX = (p.x - state.camera.x) / old;
        const worldY = (p.y - state.camera.y) / old;
        state.camera.k = next;
        state.camera.x = p.x - (worldX * next);
        state.camera.y = p.y - (worldY * next);
        requestDraw();
    }

    window.addEventListener("resize", resizeCanvas);
    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointermove", onPointerMove);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointercancel", onPointerUp);
    canvas.addEventListener("wheel", onWheel, { passive: false });

    bindDebugControls();
    resizeCanvas();
    loadData();
});
</script>
</body>
</html>
